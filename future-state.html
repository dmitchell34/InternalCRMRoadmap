<title>360° Customer Journey — To-Be (Future-State) Interactive Flow</title>
<style>
  :root{
    --navy:#1B2A4A; --navy2:#16273f; --teal:#16828F; --teal-d:#0f6470;
    --ink:#1d2530; --muted:#5b6675; --line:#dfe4ea; --bg:#eef1f5;
    --cell:#ffffff; --hd:#1B2A4A; --tobe:#E9F4F2;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:"Segoe UI",Calibri,Arial,system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  .wrap{padding:18px 20px 60px}
  .topbar{display:flex;flex-wrap:wrap;align-items:flex-start;gap:12px 26px;margin-bottom:14px}
  h1{font-size:20px;margin:0;color:var(--navy);font-weight:700}
  .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .legend{display:flex;gap:7px 14px;flex-wrap:wrap;margin-left:auto;max-width:560px}
  .legend .it{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .sw{width:12px;height:12px;border-radius:4px;display:inline-block}
  .hint{font-size:11.5px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:5px 10px;border-radius:20px}

  .scroller{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--bg);
            box-shadow:0 1px 3px rgba(20,30,50,.06);max-height:82vh}
  table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
  th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:top}

  .arc{position:sticky;top:0;z-index:30;text-align:left;color:#fff;font-size:11.5px;font-weight:700;
       letter-spacing:1.2px;padding:5px 12px;white-space:nowrap}
  .arc.s2d{background:var(--teal-d)} .arc.r2g{background:#7E8A3C} .arc.corner{background:var(--navy)}
  thead .stage{position:sticky;top:27px;z-index:25;background:var(--hd);color:#fff;font-size:12px;
        font-weight:600;padding:9px 10px;min-width:172px;line-height:1.25}
  thead .stage .num{display:inline-block;background:rgba(255,255,255,.16);border-radius:5px;padding:1px 6px;font-size:11px;margin-right:6px}
  .corner{position:sticky;left:0;z-index:35;background:var(--navy);min-width:188px;width:188px}
  thead .corner.stage{top:27px;z-index:40}
  td.persona{position:sticky;left:0;z-index:20;background:#f7f9fb;color:var(--navy);font-weight:600;
        font-size:12px;padding:9px 12px;min-width:188px;width:188px;border-right:2px solid var(--navy)}
  tbody tr:nth-child(even) td.persona{background:#eef2f6}
  td.cell{background:var(--cell);min-width:172px;padding:8px 9px 30px;position:relative}
  tbody tr:nth-child(even) td.cell{background:#fbfcfe}
  td.cell.changed{background:var(--tobe)!important}
  .act{font-size:11px;line-height:1.4;color:#46505f}
  td.cell.changed .act{color:var(--teal-d);font-weight:600}
  .badges{position:absolute;left:8px;bottom:7px;right:8px;display:flex;flex-wrap:wrap;gap:4px}
  .badge{font-size:10.5px;font-weight:700;color:#fff;border:none;border-radius:5px;padding:2px 7px;cursor:pointer;
        letter-spacing:.3px;font-family:inherit;transition:transform .08s ease, box-shadow .08s ease;outline:none}
  .badge:hover,.badge:focus-visible{transform:translateY(-1px) scale(1.06);box-shadow:0 3px 9px rgba(0,0,0,.22)}
  .badge.active{box-shadow:0 0 0 3px #fff,0 0 0 5px currentColor}

  /* Target System of Record — robust normal bottom row (not bottom-sticky) */
  tfoot td{background:#16273f;color:#eaf1f8;min-width:172px;padding:10px;border-bottom:none;border-top:3px solid var(--teal)}
  tfoot td.sorlabel{position:sticky;left:0;z-index:21;background:var(--navy);color:#fff;font-weight:700;
       font-size:10.5px;letter-spacing:1px;line-height:1.25;min-width:188px;width:188px;
       border-right:2px solid var(--teal);border-top:3px solid var(--teal)}

  tfoot .tool{font-size:10.5px;color:#aebccf;line-height:1.35;margin-top:2px}

  #fly{position:fixed;z-index:1000;width:372px;max-width:92vw;background:#fff;border:1px solid #d3dae3;
       border-radius:12px;box-shadow:0 12px 34px rgba(15,25,45,.26);opacity:0;visibility:hidden;
       transform:translateY(4px);transition:opacity .12s ease,transform .12s ease;overflow:hidden}
  #fly.show{opacity:1;visibility:visible;transform:translateY(0)}
  #fly .fhd{padding:12px 14px 11px;color:#fff}
  #fly .gid{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap}
  #fly .gid b{font-size:15px;letter-spacing:.5px}
  #fly .wschip{font-size:10px;font-weight:800;letter-spacing:.4px;background:rgba(255,255,255,.22);padding:2px 8px;border-radius:20px}
  #fly .ttl{font-size:13.5px;font-weight:600;line-height:1.3}
  #fly .meta{font-size:11px;color:rgba(255,255,255,.92);margin-top:6px;line-height:1.4}
  #fly .body{padding:11px 14px 14px;max-height:52vh;overflow:auto}
  #fly section{margin-bottom:10px} #fly section:last-child{margin-bottom:0}
  #fly h4{margin:0 0 4px;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
  #fly p{margin:0;font-size:12.5px;line-height:1.46;color:var(--ink)}
  #fly ul{margin:0;padding-left:18px} #fly li{font-size:12px;line-height:1.4;margin-bottom:3px;color:var(--ink)}
  #fly .tobe{background:#e8f6f8;border-left:3px solid var(--teal);border-radius:0 7px 7px 0;padding:8px 11px}
  #fly .tobe h4{color:var(--teal-d)} #fly .tobe p{color:#0c3d44;font-weight:500}
  #fly .facts{display:flex;gap:8px;margin:10px 0}
  #fly .facts div{flex:1;background:#f4f6f8;border:1px solid var(--line);border-radius:8px;padding:6px 8px;text-align:center}
  #fly .facts span{display:block;font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  #fly .facts b{font-size:12px;color:var(--navy)}
  #fly .pinrow{display:none}
  body.touch #fly .pinrow{display:flex;justify-content:flex-end;padding:0 14px 12px}
  #fly .close{font-size:12px;color:var(--teal-d);background:#e8f6f8;border:1px solid #bfe3e8;border-radius:7px;padding:5px 12px;cursor:pointer;font-family:inherit;font-weight:600}
  .foot{font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5}
.foot{
    font-size:11px;
    color:var(--muted);
    margin-top:12px;
    line-height:1.5;
}

/* Add this below */

.nav {
    display:flex;
    gap:10px;
    margin-left:20px;
}

.nav a {
    background:var(--teal);
    color:#fff;
    text-decoration:none;
    padding:8px 16px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}

.nav a:hover {
    background:var(--teal-d);
}

.nav a.active {
    background:var(--navy);
}
</style>

ved by email, tracked in Excel", "stage": "3 · Licensing Requirement", "persona": "Sales / Finance / Licensing", "arc": "Run-to-Grow", "tobe": "A CRM-native discount request, approval and justification workflow.", "wave": "Phase 2 — Automation", "effort": "M", "band": "60-160h", "owner": "Licensing Lead / Finance", "kpi": "Approval cycle time down; complete audit trail", "acts": ["Build a CRM-native discount request / approval / justification workflow", "Replace email approvals + central Excel file"]}, "G35": {"row": 9, "col": 2, "ws": "WS6", "title": "No requester visibility; Work 365 under-used", "stage": "3 · Licensing Requirement", "persona": "Licensing Team", "arc": "Run-to-Grow", "tobe": "Requester self-service visibility and full use of the Work 365 ↔ CRM sync.", "wave": "Phase 3 — Service/Renewals/Growth", "effort": "M", "band": "60-160h", "owner": "Licensing Lead", "kpi": "Requester follow-ups down; Work 365 utilisation up", "acts": ["Give internal requesters self-service visibility", "Fully adopt the Work 365 ↔ CRM bidirectional sync", "Reduce Partner-Center-only working"]}, "G36": {"row": 10, "col": 11, "ws": "WS6", "title": "ISV renewals reactive — late vendor invoices", "stage": "12 · Renewals", "persona": "Finance / Licensing", "arc": "Run-to-Grow", "tobe": "Proactive ISV renewal triggers and a standardised vendor renewal process.", "wave": "Phase 3 — Service/Renewals/Growth", "effort": "M", "band": "60-160h", "owner": "Finance / Licensing Lead", "kpi": "Late ISV renewals down", "acts": ["Add proactive system triggers for ISV renewals", "Standardise the vendor-renewal process", "Shift workload & risk off accounting"]}, "G37": {"row": 9, "col": 11, "ws": "WS6", "title": "No renewal / retention forecast", "stage": "12 · Renewals", "persona": "Licensing / Sales", "arc": "Run-to-Grow", "tobe": "A renewal and retention forecast with automated incentive attribution.", "wave": "Phase 3 — Service/Renewals/Growth", "effort": "L", "band": "160-360h", "owner": "Licensing Lead / Sales", "kpi": "Forecast accuracy; incentive auditability", "acts": ["Build a renewal & retention forecast", "Automate EA / CSP incentive attribution"]}, "G38": {"row": 7, "col": 12, "ws": "WS8", "title": "CRM growth data unreliable; soft data missing", "stage": "13 · Growth & Expansion", "persona": "Account Mgmt / Customer Success", "arc": "Run-to-Grow", "tobe": "A trustworthy growth data model that also captures relationship/sentiment context.", "wave": "Phase 3 — Service/Renewals/Growth", "effort": "L", "band": "160-360h", "owner": "Account Mgmt Lead", "kpi": "Growth-field completeness; trust in CRM", "acts": ["Define a growth data model (partner of record, client software, referenceable status)", "Add data governance to keep it current", "Capture relationship / sentiment context"]}, "G39": {"row": 7, "col": 12, "ws": "WS8", "title": "Reactive client management; inconsistent QBRs", "stage": "13 · Growth & Expansion", "persona": "Account Mgmt / Customer Success", "arc": "Run-to-Grow", "tobe": "A proactive QBR cadence and dashboards that cut administrative effort.", "wave": "Phase 3 — Service/Renewals/Growth", "effort": "M", "band": "60-160h", "owner": "Account Mgmt Lead", "kpi": "QBR coverage; admin time down", "acts": ["Establish a proactive QBR cadence", "Build account dashboards", "Automate cross-system data gathering to cut admin"]}}, "workstreams": {"WS1": {"name": "Lead & Opportunity Intelligence", "short": "Lead & Opp Intelligence", "color": "#16828F"}, "WS2": {"name": "Estimation & Proposal Automation", "short": "Estimation & Proposal", "color": "#2E86AB"}, "WS3": {"name": "Document & Knowledge Management", "short": "Document & Knowledge", "color": "#6D4C7D"}, "WS4": {"name": "Resource & Capacity Planning", "short": "Resource & Capacity", "color": "#C77D34"}, "WS5": {"name": "Delivery Execution & CE↔F&O Integration", "short": "Delivery & CE↔F&O", "color": "#1B7A5A"}, "WS6": {"name": "Licensing Lifecycle Automation", "short": "Licensing Lifecycle", "color": "#B5532F"}, "WS7": {"name": "Service Transition & Support", "short": "Service & Support", "color": "#3E5C8A"}, "WS8": {"name": "Account Growth & Customer Success", "short": "Account Growth", "color": "#7E8A3C"}}, "sor": ["Dataverse / CE\nZoomInfo & Outreach integrated", "Dataverse / CE + Copilot\nIntegrated estimator", "CRM / Work 365\nCRM-native intake & quoting", "Project Operations\nReal-time Power BI", "Dataverse / CE\nVersioned doc mgmt · DocuSign", "Project Operations\n(unified CE + F&O)", "Project Operations + CE\nStage gates · Customer Voice", "Project Operations\nAutomated billing", "Project Operations\nCSP automation", "Project Operations\nTwo-way closure sync", "Customer Service app\nEarly-transition playbook", "Work 365 · Power Automate\nProactive renewal triggers", "Dataverse / CE · Power BI\nCopilot · QBR dashboards"]};
const S2D_MAX = 9;
const stages=MODEL.stages, personas=MODEL.personas, cells=MODEL.cells, gaps=MODEL.gaps, WSD=MODEL.workstreams;
const tbl=document.getElementById('grid');

// legend
const lg=document.getElementById('legend');
Object.keys(WSD).forEach(code=>{
  const it=document.createElement('span'); it.className='it';
  it.innerHTML=`<span class="sw" style="background:${WSD[code].color}"></span>${code} ${esc(WSD[code].short)}`;
  lg.appendChild(it);
});

let thead='<thead><tr><th class="arc corner">JOURNEY ARC</th>';
let i=0;
while(i<stages.length){
  const isS2D=i<=S2D_MAX; const end=isS2D?S2D_MAX:stages.length-1; const span=end-i+1;
  thead+=`<th class="arc ${isS2D?'s2d':'r2g'}" colspan="${span}">`+(isS2D?'SELL-TO-DELIVER  \u25B6':'RUN-TO-GROW  \u21BA')+'</th>';
  i=end+1;
}
thead+='</tr><tr><th class="stage corner">PERSONA \u25BC / STAGE \u25B6</th>';
stages.forEach((s,c)=>{ thead+=`<th class="stage"><span class="num">${c+1}</span>${esc(s)}</th>`; });
thead+='</tr></thead>';

let tbody='<tbody>';
personas.forEach((p,r)=>{
  tbody+=`<tr><td class="persona">${esc(p)}</td>`;
  stages.forEach((s,c)=>{
    const cd=cells[r+','+c]; const act=cd?cd.t:''; const changed=cd&&cd.ch;
    const cellgaps=Object.values(gaps).filter(g=>g.row===r&&g.col===c).sort((a,b)=>num(a)-num(b));
    let bd='';
    cellgaps.forEach(g=>{ const id=gid(g); bd+=`<button class="badge" style="background:${WSD[g.ws].color}" data-id="${id}">${id}</button>`; });
    tbody+=`<td class="cell${changed?' changed':''}">${act?`<div class="act">${esc(act)}</div>`:''}`+(bd?`<div class="badges">${bd}</div>`:'')+'</td>';
  });
  tbody+='</tr>';
});
tbody+='</tbody>';

let tfoot='<tfoot><tr><td class="sorlabel">TARGET SYSTEM OF RECORD</td>';
(MODEL.sor||[]).forEach(entry=>{
  const lines=String(entry).split('\n'); const sys=esc(lines[0]||''); const tool=lines.slice(1).map(esc).join(' \u00B7 ');
  tfoot+=`<td><div class="sys">${sys}</div>${tool?`<div class="tool">${tool}</div>`:''}</td>`;
});
tfoot+='</tr></tfoot>';
tbl.innerHTML=thead+tbody+tfoot;

const fly=document.getElementById('fly');
const isTouch=window.matchMedia('(hover:none)').matches;
if(isTouch) document.body.classList.add('touch');
let pinned=null;
function gid(g){ for(const k in gaps){ if(gaps[k]===g) return k; } return ''; }
function num(g){ return parseInt(gid(g).slice(1),10); }
function render(id){
  const g=gaps[id]; const ws=WSD[g.ws]; const col=ws.color;
  const acts=(g.acts||[]).map(a=>`<li>${esc(a)}</li>`).join('');
  fly.innerHTML=
   `<div class="fhd" style="background:${col}">
      <div class="gid"><b>${id}</b><span class="wschip">${esc(g.ws)} \u00B7 ${esc(ws.short)}</span></div>
      <div class="ttl">${esc(g.title)}</div>
      <div class="meta">Stage: ${esc(g.stage)} &nbsp;\u00B7&nbsp; ${esc(g.persona)} &nbsp;\u00B7&nbsp; ${esc(g.arc)}</div>
    </div>
    <div class="body">
      <section class="tobe"><h4>To-Be capability</h4><p>${esc(g.tobe)}</p></section>
      <section><h4>Key activities</h4><ul>${acts}</ul></section>
      <div class="facts">
        <div><span>Phase</span><b>${esc(g.wave.split('\u2014')[0].trim())}</b></div>
        <div><span>Effort</span><b>${esc(g.effort)} \u00B7 ${esc(g.band)}</b></div>
      </div>
      <section><h4>Owner</h4><p>${esc(g.owner)}</p></section>
      <section><h4>Success measure</h4><p>${esc(g.kpi)}</p></section>
    </div>
    <div class="pinrow"><button class="close" id="flyClose">Close</button></div>`;
  const cb=document.getElementById('flyClose'); if(cb) cb.onclick=hide;
}
function place(el){
  const b=el.getBoundingClientRect(); fly.style.visibility='hidden'; fly.classList.add('show');
  const fw=fly.offsetWidth, fh=fly.offsetHeight;
  let left=b.right+12; if(left+fw>window.innerWidth-8) left=b.left-fw-12; if(left<8) left=Math.max(8,(window.innerWidth-fw)/2);
  let top=b.top-6; if(top+fh>window.innerHeight-8) top=window.innerHeight-fh-8; if(top<8) top=8;
  fly.style.left=left+'px'; fly.style.top=top+'px'; fly.style.visibility='';
}
function show(el){ render(el.dataset.id); place(el); document.querySelectorAll('.badge').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }
function hide(){ fly.classList.remove('show'); pinned=null; document.querySelectorAll('.badge').forEach(x=>x.classList.remove('active')); }
document.querySelectorAll('.badge').forEach(el=>{
  if(!isTouch){
    el.addEventListener('mouseenter',()=>{ if(!pinned) show(el); });
    el.addEventListener('mouseleave',()=>{ if(!pinned) fly.classList.remove('show'); });
    el.addEventListener('focus',()=>show(el));
    el.addEventListener('blur',()=>{ if(!pinned) fly.classList.remove('show'); });
  }
  el.addEventListener('click',e=>{ e.stopPropagation(); if(pinned===el){hide();}else{pinned=el;show(el);} });
});
document.addEventListener('click',e=>{ if(pinned && !fly.contains(e.target)) hide(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') hide(); });
document.getElementById('scroller').addEventListener('scroll',()=>{ if(!pinned) fly.classList.remove('show'); });
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
